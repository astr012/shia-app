# ============================================================
# SignAI_OS — Docker Compose
#
# One-command startup for the full system:
#   docker compose up --build
#
# Services:
#   backend  → http://localhost:8000 (FastAPI + WebSocket)
#   frontend → http://localhost:3000 (Next.js)
# ============================================================

services:
  redis:
    image: "redis:alpine"
    container_name: shia-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: shia-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - ENV=production
      - HOST=0.0.0.0
      - PORT=8000
      - FRONTEND_URL=http://localhost:3000
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: shia-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000/ws
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

